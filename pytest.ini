# 测试配置文件
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html:htmlcov

# 标记配置
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 慢速测试

# 过滤配置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
